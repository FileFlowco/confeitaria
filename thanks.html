<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aura de Mel | Contato</title>

<style>

*{
box-sizing:border-box;
}

body {
font-family: system-ui,-apple-system,sans-serif;

background-color:#e9f1f4;
background-image:
radial-gradient(circle at 50% -20%, #e89aa3 0%, rgba(233,241,244,0) 75%),
radial-gradient(circle at 80% 80%, rgba(232,154,163,0.15) 0%, rgba(233,241,244,0) 50%);

background-attachment:fixed;

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

padding:20px;
margin:0;

text-align:center;
}

.container{

width:100%;
max-width:680px;

background:rgba(255,255,255,0.25);

backdrop-filter:blur(14px);

padding:80px 60px;

border-radius:10px;

border:1px solid rgba(232,154,163,0.25);

box-shadow:0 25px 60px rgba(0,0,0,0.08);
}

h1{

font-size:clamp(2rem,4vw,2.8rem);

margin-bottom:25px;

color:#333;

font-weight:300;

letter-spacing:-0.5px;
}

p{

font-size:clamp(1rem,1.2vw,1.15rem);

color:#555;

margin-bottom:40px;

line-height:1.7;
}

a{

display:inline-block;

padding:18px 48px;

background:#e89aa3;

color:white;

text-decoration:none;

letter-spacing:2px;

text-transform:uppercase;

font-size:0.9rem;

font-weight:600;

border-radius:6px;

transition:all .25s ease;
}

a:hover{

transform:translateY(-3px);

box-shadow:0 14px 28px rgba(232,154,163,0.35);
}

@media (max-width:600px){

.container{

padding:60px 35px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Recebemos seu pedido</h1>

<p>
Obrigado por entrar em contato com a <strong>Aura de Mel</strong>.<br>
Nossa equipe de confeitaria responderá em até 24 horas.
</p>

<a href="index.html">Voltar ao Início</a>

</div>

</body>
</html>
