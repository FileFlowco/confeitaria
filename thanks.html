<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aura de Mel | Contato</title>

<style>
body {
    font-family: system-ui, -apple-system, sans-serif;
    /* Usei suas duas cores aqui para criar um efeito de 'Aura' premium */
    background-color: #e9f1f4;
    background-image: 
        radial-gradient(circle at 50% -20%, #e89aa3 0%, rgba(233, 241, 244, 0) 75%),
        radial-gradient(circle at 80% 80%, rgba(232, 154, 163, 0.15) 0%, rgba(233, 241, 244, 0) 50%);
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    margin: 0;
}

.container {
    max-width: 500px;
    background: rgba(255, 255, 255, 0.2); /* Sutil transparência premium */
    backdrop-filter: blur(10px);
    padding: 60px 40px;
    border-radius: 4px;
    border: 1px solid rgba(232, 154, 163, 0.2);
}

h1 {
    font-size: 2.2rem;
    margin-bottom: 20px;
    color: #333;
    font-weight: 300;
    letter-spacing: -1px;
}

p {
    color: #555;
    margin-bottom: 30px;
    line-height: 1.6;
}

a {
    display: inline-block;
    padding: 14px 35px;
    background: #e89aa3; /* Sua cor principal no botão */
    color: white;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 0.75rem;
    font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
}

a:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(232, 154, 163, 0.3);
}
</style>

</head>

<body>

<div class="container">
    <h1>Recebemos seu pedido</h1>
    <p>
        Obrigado por entrar em contato com a <strong>Aura de Mel</strong>.<br>
        Nossa equipe de confeitaria responderá em até 24 horas.
    </p>
    <a href="index.html">Voltar ao Início</a>
</div>

</body>
</html>
